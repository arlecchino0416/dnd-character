<style>

.music-btn{width:32px;height:32px;border-radius:50%;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.2);color:var(--soft);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.music-btn:hover{background:rgba(124,92,252,.3);border-color:var(--accent)}

.progress-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}

.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));width:0%}

.edit-panel.open{right:0}

.edit-g{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:8px}
.edit-f{display:flex;flex-direction:column;gap:2px}
.edit-f label{font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.edit-f input,.edit-f textarea,.edit-f select{background:rgba(124,92,252,.06);border:1px solid rgba(124,92,252,.1);border-radius:4px;padding:4px 7px;color:var(--fg);font-size:.78rem;font-family:inherit;outline:none}
.edit-f input:focus,.edit-f textarea:focus{border-color:var(--accent)}

.edit-f.full{grid-column:span 2}

.edit-act{position:sticky;bottom:0;display:flex;gap:8px;margin-top:16px;padding:12px 0;border-top:1px solid rgba(124,92,252,.1);background:rgba(12,10,22,.98)}
.edit-act button{flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600}
.btn-s{background:var(--accent);color:#fff}
.btn-r{background:rgba(124,92,252,.1);color:var(--muted)}
.btn-x{background:rgba(91,154,255,.15);color:var(--blue)}
.edit-ok{color:var(--green);font-size:.7rem;text-align:center;padding:4px;opacity:0}

.cr-a{background:rgba(124,92,252,.08);border:1px dashed rgba(124,92,252,.15);border-radius:6px;padding:8px;margin:6px 0;cursor:pointer;text-align:center;color:var(--muted);font-size:.72rem}
.cr-a:hover{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--soft)}
.cr-i{border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px 8px;margin:4px 0;position:relative}

.cr-i:hover .cr-d,.sec-i:hover .sec-d{opacity:1}
.sec-i{border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px 8px;margin:4px 0;position:relative}

.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.1);border-radius:5px;padding:4px 10px;cursor:pointer;font-size:.7rem;color:var(--muted)}
.tab:hover{background:rgba(124,92,252,.15);color:var(--soft)}
.tab.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-p{display:none}
.tab-p.open{display:block}
@media(max-width:560px){.edit-panel{width:100vw;right:-100vw}}
h1{font-size:1.8rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#f0e6ff,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:1.15rem;font-weight:700;color:var(--soft);margin:28px 0 10px;padding-bottom:5px;border-bottom:1.5px solid rgba(124,92,252,.2);display:flex;align-items:center;gap:8px}
h2::before{content:"◇";font-size:.7rem;color:var(--accent)}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;margin:1px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.15);color:#b0a0d0}
.tag-r{background:rgba(255,94,107,.08);border-color:rgba(255,94,107,.15);color:#ff8a94}

.card p{font-size:.8rem;color:#b0a0c8;line-height:1.6}
.card .meta{font-size:.65rem;color:var(--muted);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.g-a{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px}

.spell-block{margin:14px 0}
.sb-hd{font-size:.8rem;font-weight:600;color:var(--soft);padding:4px 0 2px;border-left:3px solid var(--accent);padding-left:8px;margin-bottom:2px}
.spell-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spell-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:6px 9px;background:rgba(255,255,255,.012)}
.sc-hd{font-size:.76rem;color:#c8b8e0;font-weight:500}
.sc-school{font-size:.62rem;color:#6a5a8a}
.sc-desc{font-size:.7rem;color:#b0a0c8;line-height:1.55;margin-top:3px}
.sc-meta{font-size:.6rem;color:#5a4a7a;margin-top:3px;font-family:monospace}
.inst-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:5px 8px;background:rgba(255,255,255,.012)}
@media(max-width:560px){.g2,.spell-row{grid-template-columns:1fr}.abilities{grid-template-columns:1fr 1fr}}
.chronicle{position:relative;padding-left:24px;margin:6px 0}
.chronicle::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:1.5px;background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.05))}
.chronicle-item{position:relative;padding:6px 0 6px 16px}
.chronicle-item::before{content:'';position:absolute;left:-18px;top:11px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:rgba(124,92,252,.15)}
.chronicle-item .ch-tag{display:inline-block;font-size:.58rem;padding:0 5px;border-radius:3px;margin-right:3px;font-weight:500;background:rgba(124,92,252,.15);color:var(--soft)}
.chronicle-item .ch-title{font-weight:600;color:#d0bcf0;font-size:.85rem}
.chronicle-item .ch-body{font-size:.8rem;color:#b0a0c8;line-height:1.65;margin-top:2px}
.party{display:flex;flex-wrap:wrap;gap:5px}
.party .pc{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:7px;padding:6px 12px;font-size:.78rem}
.party .pc .nm{color:#d0bcf0;font-weight:600}
.party .pc .cl{color:var(--muted);font-size:.7rem}
.eq{display:inline-block;background:rgba(124,92,252,.03);border:1px solid rgba(124,92,252,.06);border-radius:4px;padding:2px 7px;margin:1px;font-size:.74rem;color:#b0a0c8}
.eq-gold{background:rgba(212,160,87,.05);border-color:rgba(212,160,87,.08);color:#e0c080}
</style>
</head>

bg:'星期日出生于卡林港的橡木密教，这是一个世代侍奉梦女神蕾拉的神裔家族。他天生能听见他人心底的软弱，触碰梦境的涟漪。他有一个妹妹，知更鸟——她的歌声像星光一样能平息最狂乱的噩梦。童年平静而温柔：练钢琴、学梦境聆听、帮母亲打理花园、和妹妹在卡林港的阳光下喂鸽子。母亲常说："我们橡木之人，是梦的牧者，要安抚痛苦，而非制造枷锁。"直到一颗异界星辰砸进卡林港大剧院——街区崩塌、梦境失控、人们溺死在自己的恐惧里。母亲为护住他与妹妹，在梦境裂隙中消散。一夜之间成了孤儿，被密教家主歌斐木收养。歌斐木严厉却公正，教星期日编织梦境、安抚幻惑、治愈圣光，称他为"铎音"——梦之倾听者。星期日开始在卡林港的底层行走：贫民窟、奴隶市场、逐梦人的小巷。他听见工人的疲惫、孤儿的哭泣、难民的绝望——而神明从不回应，贵族视而不见。一颗阴霾的种子由心而发：温柔救不了人，善良挡不住痛苦。一只断翅白鸽被救活后飞走，却坠死在他们窗前。星期日开始在书本里寻找答案：梦界理论、秩序典籍、古代神谕。如果不能消除痛苦，那就给他们一个没有痛苦的梦；如果自由带来伤害，那就给他们安全的牢笼。16岁那年，妹妹受邀前往深水城巡演。星期日也离开卡林港，带着乐器、日记本和妹妹的照片，出发去寻找"既能保护弱者、又不剥夺自由"的答案。彼时的他，非独裁者，非家主，亦非梦之暴君——只是一个想治愈世界、却尚未找到方法的少年阿斯莫。',

    '</div><div style="text-align:center;margin-bottom:8px"><input id="newLevelName" placeholder="如 4环、5环" style="width:120px;background:rgba(124,92,252,.06);border:1px solid rgba(124,92,252,.1);border-radius:4px;padding:4px 7px;color:var(--fg);font-size:.75rem;margin-right:4px"> <span class="cr-a" id="addLevelBtn" style="display:inline;padding:4px 12px">+ 添加法术环级</span></div>';
  
  lv.forEach(function(l){
    var arr=sp[l]||[];
    html+='<div style="margin-bottom:8px;border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px">'+
      '<div style="font-size:.75rem;color:'+(colors[l]||'var(--soft)')+';margin-bottom:4px">'+l+' <span style="color:var(--soft);cursor:pointer" class="addSpell" data-lv="'+l+'">+ 添加法术</span></div>';
    arr.forEach(function(s,j){
      html+='<div class="spell-card" style="margin:3px 0;position:relative">'+
        '<div class="sc-hd">'+esc(s.n)+' <span class="sc-school">'+esc(s.s||'')+'</span>'+
        ' <span style="float:right;cursor:pointer;color:var(--red);font-size:10px" class="delSpell" data-lv="'+l+'" data-idx="'+j+'">✕</span></div>'+
        '<div class="sc-desc">'+esc(s.d||'')+'</div><div class="sc-meta">'+esc(s.m||'')+'</div></div>';
    });
    html+='</div>';
  });
  
  // Instrument spells
  var inst=sp['乐器']||[];
  html+='<div style="margin:8px 0;border:1px solid rgba(212,160,87,.12);border-radius:5px;padding:6px">'+
    '<div style="font-size:.75rem;color:var(--gold);margin-bottom:4px">🎵 乐器法术 <span style="color:var(--soft);cursor:pointer" class="addSpell" data-lv="乐器">+ 添加</span></div>';
  inst.forEach(function(s,j){
    html+='<div class="inst-card" style="margin:3px 0;position:relative">'+
      '<div class="sc-hd">'+esc(s.n)+' <span class="sc-school">'+esc(s.s||'')+'</span>'+
      ' <span style="float:right;cursor:pointer;color:var(--red);font-size:10px" class="delSpell" data-lv="乐器" data-idx="'+j+'">✕</span></div>'+
      '<div class="sc-desc">'+esc(s.d||'')+'</div><div class="sc-meta">'+esc(s.m||'')+'</div></div>';
  });
  html+='</div>';
  
  el.innerHTML=html;
  
  // Event listeners for spell management
  el.querySelectorAll('.delSpell').forEach(function(b){b.addEventListener('click',function(){
    var l=this.getAttribute('data-lv'),i=parseInt(this.getAttribute('data-idx')),d2=ld();
    if(d2.spells[l])d2.spells[l].splice(i,1);sv(d2);render(d2);buildTabs();
  })});
  el.querySelectorAll('.addSpell').forEach(function(b){b.addEventListener('click',function(){
    var l=this.getAttribute('data-lv'),nm=prompt('法术名称：');if(!nm)return;
    var sc=prompt('学派（如 塑能、惑控）：')||'',dc=prompt('完整描述（给新手看的详细说明）：')||'',mt=prompt('施法信息（动作·距离·成分·持续等）：')||'';
    var d2=ld();if(!d2.spells[l])d2.spells[l]=[];d2.spells[l].push({n:nm,s:sc,d:dc,m:mt});
    sv(d2);render(d2);buildTabs();
  })});
  el.querySelectorAll('.delLevel').forEach(function(b){b.addEventListener('click',function(){
    var l=this.getAttribute('data-lv');if(!confirm('删除「'+l+'」及其所有法术？'))return;
    var d2=ld();d2.spellLevels=d2.spellLevels.filter(function(x){return x!==l});delete d2.spells[l];delete d2.spellSlots[l];
    sv(d2);render(d2);buildTabs();
  })});
  document.getElementById('addLevelBtn').onclick=function(){
    var nm=document.getElementById('newLevelName').value.trim();if(!nm)return;
    var d2=ld();if(!d2.spellLevels)d2.spellLevels=[];if(d2.spellLevels.indexOf(nm)>=0)return alert('已存在');
    d2.spellLevels.push(nm);if(!d2.spells)d2.spells={};d2.spells[nm]=[];if(!d2.spellSlots)d2.spellSlots={};d2.spellSlots[nm]='';
    sv(d2);render(d2);buildTabs();
  };
}

function collect(){
  var d=ld();
  // Simple fields
  ['lvl','prof','hp','ac','init','speed','pp','bi','dc','atk','slots','saves','skills','resist','tools','langs','equip','bg'].forEach(function(k){
    var el=document.querySelector('.f-'+k);if(el)d[k]=el.value;
  });
  ['str','dex','con','int','wis','cha'].forEach(function(k){
    var el=document.querySelector('.f-'+k);if(el)d[k]=el.value;
  });
  // Lists
  ['race','feats','features','magic','party','people'].forEach(function(list){
    var container=document.getElementById('list_'+list);
    if(!container)return;
    d[list]=[];
    container.querySelectorAll('.sec-i').forEach(function(el){
      if(list==='race')d[list].push({n:(el.querySelector('.f-rn')||{}).value||'',d:(el.querySelector('.f-rd')||{}).value||''});
      else if(list==='feats'||list==='features')d[list].push({n:(el.querySelector('.f-fn')||{}).value||'',t:(el.querySelector('.f-ft')||{}).value||'',d:(el.querySelector('.f-fd')||{}).value||''});
      else if(list==='magic')d[list].push({n:(el.querySelector('.f-mn')||{}).value||'',d:(el.querySelector('.f-md')||{}).value||''});
      else if(list==='party')d[list].push({n:(el.querySelector('.f-pn')||{}).value||'',c:(el.querySelector('.f-pc')||{}).value||''});
      else if(list==='people')d[list].push((el.querySelector('.f-ppl')||{}).value||'');
    });
  });
  // Chronicle
  var cl=document.getElementById('list_chronicle');
  if(cl){d.chronicle=[];cl.querySelectorAll('.cr-i').forEach(function(el){
    d.chronicle.push({tag:(el.querySelector('.f-ct')||{}).value||'',title:(el.querySelector('.f-ch')||{}).value||'',body:(el.querySelector('.f-cb')||{}).value||''});
  });}
  // Spell levels & slots
  if(d.spellLevels){
    d.spellLevels.forEach(function(l){
      var el=document.querySelector('.f-sl_'+l);
      if(el)d.spellSlots[l]=el.value;
    });
  }
  return d;
}

(function(){var c=document.getElementById('feather-container');if(!c)return;
function f(){var e=document.createElement('div');e.className='feather';var sz=12+Math.random()*16,sx=Math.random()*100,du=6+Math.random()*8,de=Math.random()*2,dr=-30+Math.random()*60,ro=Math.random()*360,sp=-120+Math.random()*240,op=.3+Math.random()*.5,bl=Math.random()*1.5;
e.style.cssText='left:'+sx+'%;width:'+sz+'px;height:'+sz*.45+'px;opacity:0;filter:blur('+bl+'px)';
var kf=[{opacity:0,transform:'translateY(0) translateX(0) rotate('+ro+'deg)',offset:0},{opacity:op,transform:'translateY(10vh) translateX('+dr*.2+'px) rotate('+(ro+sp*.15)+'deg)',offset:.08},{opacity:op,transform:'translateY(40vh) translateX('+dr*.5+'px) rotate('+(ro+sp*.4)+'deg)',offset:.35},{opacity:op*.8,transform:'translateY(70vh) translateX('+dr*.8+'px) rotate('+(ro+sp*.7)+'deg)',offset:.65},{opacity:0,transform:'translateY(105vh) translateX('+dr+'px) rotate('+(ro+sp)+'deg)',offset:1}];
var ti={duration:du*1000,delay:de*1000,easing:'cubic-bezier(0.25,0.46,0.45,0.94)',fill:'forwards'};c.appendChild(e);var an=e.animate(kf,ti);an.onfinish=function(){e.remove()}}
for(var i=0;i<12;i++)setTimeout(f,i*400);var st=setInterval(f,1800);document.addEventListener('visibilitychange',function(){if(document.hidden)clearInterval(st);else st=setInterval(f,1800)})})();
