<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b18;--card:#151220;--card2:#1a1730;--fg:#e0d8cc;--muted:#7a6a9a;--a:#2d1b69;--b:#4a2a8a;--accent:#7c5cfc;--gold:#d4a057;--soft:#c4a4ff;--red:#ff5e6b;--green:#6bcb8a;--blue:#5b9aff}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans SC","PingFang SC","Segoe UI",system-ui,sans-serif;padding:0;line-height:1.6;overflow-x:hidden}
.pg{max-width:800px;margin:0 auto;padding:0 14px 60px;position:relative;z-index:2}
#feather-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
.feather{position:absolute;top:-60px;width:18px;height:8px;background:radial-gradient(ellipse at 30% 50%,rgba(255,248,220,.85),rgba(212,160,87,.2) 60%,transparent 80%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:0;box-shadow:0 0 8px 3px rgba(212,160,87,.08),0 0 2px 1px rgba(255,248,220,.04);will-change:transform,opacity}
.feather::after{content:'';position:absolute;top:2px;left:50%;width:1px;height:6px;background:linear-gradient(to bottom,rgba(255,248,200,.4),transparent);transform:translateX(-50%)}
.music-bar{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;align-items:center;gap:10px;background:rgba(21,18,32,.88);border:1px solid rgba(124,92,252,.15);border-radius:50px;padding:8px 16px 8px 12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.music-btn{width:32px;height:32px;border-radius:50%;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.2);color:var(--soft);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.music-btn:hover{background:rgba(124,92,252,.3);border-color:var(--accent)}
.music-btn.playing{background:rgba(124,92,252,.25);border-color:var(--accent)}
.progress-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.progress-bar{flex:1;height:4px;border-radius:2px;background:rgba(124,92,252,.12);cursor:pointer;position:relative;min-width:40px}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));width:0%}
.time-display{font-size:.6rem;color:var(--muted);font-variant-numeric:tabular-nums;min-width:55px;text-align:center}
.vol-slider{width:0;overflow:hidden;transition:width .3s;display:flex;align-items:center}
.music-bar:hover .vol-slider{width:80px}
.vol-slider input[type=range]{width:72px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(124,92,252,.2);border-radius:2px;outline:none;margin-left:6px}
.vol-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.vol-slider input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}

/* Edit button + panel */
.edit-btn{position:fixed;bottom:76px;right:24px;z-index:100;background:rgba(21,18,32,.88);border:1px solid rgba(124,92,252,.2);color:var(--soft);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.edit-btn:hover{background:rgba(124,92,252,.25);border-color:var(--accent)}
.edit-btn.active{background:var(--accent);color:#fff}
.edit-panel{position:fixed;top:0;right:-460px;width:440px;height:100vh;z-index:99;background:rgba(12,10,22,.98);border-left:1px solid rgba(124,92,252,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:right .35s cubic-bezier(0.22,1,0.36,1);padding:60px 16px 100px;overflow-y:auto;font-size:.82rem;box-shadow:-4px 0 30px rgba(0,0,0,.4)}
.edit-panel.open{right:0}
.edit-panel h3{color:var(--gold);font-size:.9rem;margin:18px 0 8px;border-bottom:1px solid rgba(212,160,87,.1);padding-bottom:4px}
.edit-panel h4{color:var(--soft);font-size:.8rem;margin:12px 0 4px}
.edit-g{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:8px}
.edit-f{display:flex;flex-direction:column;gap:2px}
.edit-f label{font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.edit-f input,.edit-f textarea,.edit-f select{background:rgba(124,92,252,.06);border:1px solid rgba(124,92,252,.1);border-radius:4px;padding:4px 7px;color:var(--fg);font-size:.78rem;font-family:inherit;outline:none}
.edit-f input:focus,.edit-f textarea:focus{border-color:var(--accent)}
.edit-f.half{grid-column:span 1}
.edit-f.full{grid-column:span 2}
.edit-f textarea{min-height:45px;resize:vertical}
.edit-act{position:sticky;bottom:0;display:flex;gap:8px;margin-top:16px;padding:12px 0;border-top:1px solid rgba(124,92,252,.1);background:rgba(12,10,22,.98)}
.edit-act button{flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600}
.btn-s{background:var(--accent);color:#fff}
.btn-r{background:rgba(124,92,252,.1);color:var(--muted)}
.btn-x{background:rgba(91,154,255,.15);color:var(--blue)}
.edit-ok{color:var(--green);font-size:.7rem;text-align:center;padding:4px;opacity:0}
.edit-ok.show{opacity:1}
.cr-a{background:rgba(124,92,252,.08);border:1px dashed rgba(124,92,252,.15);border-radius:6px;padding:8px;margin:6px 0;cursor:pointer;text-align:center;color:var(--muted);font-size:.72rem}
.cr-a:hover{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--soft)}
.cr-i{border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px 8px;margin:4px 0;position:relative}
.cr-d{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(255,94,107,.1);border:1px solid rgba(255,94,107,.15);color:var(--red);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0}
.cr-i:hover .cr-d{opacity:1}
.sec-i{border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px 8px;margin:4px 0;position:relative}
.sec-d{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(255,94,107,.1);border:1px solid rgba(255,94,107,.15);color:var(--red);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0}
.sec-i:hover .sec-d{opacity:1}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.1);border-radius:5px;padding:4px 10px;cursor:pointer;font-size:.7rem;color:var(--muted)}
.tab:hover{background:rgba(124,92,252,.15);color:var(--soft)}
.tab.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-p{display:none}
.tab-p.open{display:block}
@media(max-width:560px){.edit-panel{width:100vw;right:-100vw}}

/* Page styles */
h1{font-size:1.8rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#f0e6ff,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:1.15rem;font-weight:700;color:var(--soft);margin:28px 0 10px;padding-bottom:5px;border-bottom:1.5px solid rgba(124,92,252,.2);display:flex;align-items:center;gap:8px}
h2::before{content:"◇";font-size:.7rem;color:var(--accent)}
h3{font-size:.95rem;color:#d0bcf0;margin:14px 0 6px}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;margin:1px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.15);color:#b0a0d0}
.tag-r{background:rgba(255,94,107,.08);border-color:rgba(255,94,107,.15);color:#ff8a94}
.tag-g{background:rgba(107,203,138,.08);border-color:rgba(107,203,138,.15);color:#8bdaa4}
.tag-b{background:rgba(91,154,255,.08);border-color:rgba(91,154,255,.15);color:#8bb8ff}
.tag-y{background:rgba(212,160,87,.08);border-color:rgba(212,160,87,.15);color:#e0c080}
.hero{text-align:center;padding:32px 0 16px}
.hero::after{content:'';display:block;width:60px;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:12px auto 0}
.hero .cn{font-size:.8rem;color:var(--muted);letter-spacing:4px}
.hero .info{font-size:.82rem;color:#b0a0c8;margin-top:5px}
.portrait-wrap{width:100%;max-width:320px;margin:16px auto;border-radius:10px;overflow:hidden;border:1px solid rgba(124,92,252,.12)}
.portrait-wrap img{width:100%;display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.info-grid .ig{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:7px;padding:8px 12px}
.info-grid .ig .lb{font-size:.62rem;letter-spacing:1.5px;color:var(--muted)}
.info-grid .ig .vl{font-size:1rem;font-weight:600;color:#d8ccee}
.abilities{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.ab{text-align:center;background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:8px;padding:10px 4px}
.ab .n{font-size:.6rem;letter-spacing:2px;color:var(--muted)}
.ab .v{font-size:1.2rem;font-weight:700;color:#e8ddf8}
.ab .m{font-size:.78rem;color:var(--muted)}
.card{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:8px;padding:10px 12px;margin:6px 0}
.card .hd{font-weight:600;color:#d0bcf0;margin-bottom:3px;font-size:.85rem}
.card .hd .rn{font-weight:400;font-size:.65rem;color:var(--muted)}
.card p{font-size:.8rem;color:#b0a0c8;line-height:1.6}
.card .meta{font-size:.65rem;color:var(--muted);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.g-a{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px}
.g-as{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px}
.spell-block{margin:14px 0}
.sb-hd{font-size:.8rem;font-weight:600;color:var(--soft);padding:4px 0 2px;border-left:3px solid var(--accent);padding-left:8px;margin-bottom:2px}
.spell-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spell-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:6px 9px;background:rgba(255,255,255,.012)}
.sc-hd{font-size:.76rem;color:#c8b8e0;font-weight:500}
.sc-school{font-size:.62rem;color:#6a5a8a}
.sc-desc{font-size:.7rem;color:#b0a0c8;line-height:1.55;margin-top:3px}
.sc-meta{font-size:.6rem;color:#5a4a7a;margin-top:3px;font-family:monospace}
.inst-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:5px 8px;background:rgba(255,255,255,.012)}
@media(max-width:560px){.g2,.spell-row{grid-template-columns:1fr}.abilities{grid-template-columns:1fr 1fr}}
.chronicle{position:relative;padding-left:24px;margin:6px 0}
.chronicle::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:1.5px;background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.05))}
.chronicle-item{position:relative;padding:6px 0 6px 16px}
.chronicle-item::before{content:'';position:absolute;left:-18px;top:11px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:rgba(124,92,252,.15)}
.chronicle-item .ch-tag{display:inline-block;font-size:.58rem;padding:0 5px;border-radius:3px;margin-right:3px;font-weight:500;background:rgba(124,92,252,.15);color:var(--soft)}
.chronicle-item .ch-title{font-weight:600;color:#d0bcf0;font-size:.85rem}
.chronicle-item .ch-body{font-size:.8rem;color:#b0a0c8;line-height:1.65;margin-top:2px}
.party{display:flex;flex-wrap:wrap;gap:5px}
.party .pc{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:7px;padding:6px 12px;font-size:.78rem}
.party .pc .nm{color:#d0bcf0;font-weight:600}
.party .pc .cl{color:var(--muted);font-size:.7rem}
.eq{display:inline-block;background:rgba(124,92,252,.03);border:1px solid rgba(124,92,252,.06);border-radius:4px;padding:2px 7px;margin:1px;font-size:.74rem;color:#b0a0c8}
.eq-gold{background:rgba(212,160,87,.05);border-color:rgba(212,160,87,.08);color:#e0c080}
.note-box{background:rgba(124,92,252,.04);border-left:3px solid var(--gold);border-radius:0 7px 7px 0;padding:8px 12px;margin:8px 0;font-size:.78rem;color:#c0b0d0}
</style>
</head>

var curTab='stats';

function buildTabs(){
  var tb=document.getElementById('tabBar'),tc=document.getElementById('tabContent');
  tb.innerHTML=tabs.map(function(t){return '<div class="tab'+(t.id===curTab?' act':'')+'" data-tab="'+t.id+'">'+t.label+'</div>'}).join('');
  tb.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click',function(){curTab=this.getAttribute('data-tab');buildTabs();fillForm(ld())});
  });
  var d=ld();
  if(curTab==='stats')buildStatsTab(tc,d);
  else if(curTab==='attrs')buildAttrsTab(tc,d);
  else if(curTab==='combat')buildCombatTab(tc,d);
  else if(curTab==='race')buildRaceTab(tc,d);
  else if(curTab==='feats')buildFeatsTab(tc,d);
  else if(curTab==='classf')buildClassTab(tc,d);
  else if(curTab==='spells')buildSpellsTab(tc,d);
  else if(curTab==='equip')buildEquipTab(tc,d);
  else if(curTab==='story')buildStoryTab(tc,d);
  else if(curTab==='chronicle')buildChronicleTab(tc,d);
  else if(curTab==='data')buildDataTab(tc,d);
}

// ═══ Generic add item ═══
function addItem(list){
  var d2=ld();
  if(list==='race'){if(!d2.race)d2.race=[];d2.race.push({n:'新特性',d:'描述……'});}
  else if(list==='feats'){if(!d2.feats)d2.feats=[];d2.feats.push({n:'新专长',t:'等级标签',d:'描述……'});}
  else if(list==='features'){if(!d2.features)d2.features=[];d2.features.push({n:'新特性',t:'频率',d:'描述……'});}
  else if(list==='magic'){if(!d2.magic)d2.magic=[];d2.magic.push({n:'新物品',d:'描述……'});}
  else if(list==='party'){if(!d2.party)d2.party=[];d2.party.push({n:'新旅伴',c:'职业'});}
  else if(list==='people'){if(!d2.people)d2.people=[];d2.people.push('新人物|描述');}
  else if(list==='chronicle'){if(!d2.chronicle)d2.chronicle=[];d2.chronicle.push({tag:'新章',title:'新纪事',body:'写下冒险经历……'});}
  sv(d2);rn(d2);buildTabs();
}

// ═══ Collect form ═══
function collect(){
  var d=ld();
  // Stats
  ['lvl','prof','hp','ac','init','speed','pp','bi','dc','atk','slots','saves','skills','resist','tools','langs','equip','bg'].forEach(function(k){
    var el=document.querySelector('.f-'+k);if(el)d[k]=el.value;
  });
  // Attrs
  ['str','dex','con','int','wis','cha'].forEach(function(k){
    var el=document.querySelector('.f-'+k);if(el)d[k]=el.value;
  });
  // Race
  var rl=document.getElementById('raceList');
  if(rl){d.race=[];rl.querySelectorAll('.sec-i').forEach(function(el){
    d.race.push({n:(el.querySelector('.f-rn')||{}).value||'',d:(el.querySelector('.f-rd')||{}).value||''});
  });}
  // Feats
  var fl=document.getElementById('featList');
  if(fl){d.feats=[];fl.querySelectorAll('.sec-i').forEach(function(el){
    d.feats.push({n:(el.querySelector('.f-fn')||{}).value||'',t:(el.querySelector('.f-ft')||{}).value||'',d:(el.querySelector('.f-fd')||{}).value||''});
  });}
  // Features (reuse featList id in class tab)
  var ff=document.getElementById('featList');
  if(ff&&curTab==='classf'){d.features=[];ff.querySelectorAll('.sec-i').forEach(function(el){
    d.features.push({n:(el.querySelector('.f-fn')||{}).value||'',t:(el.querySelector('.f-ft')||{}).value||'',d:(el.querySelector('.f-fd')||{}).value||''});
  });}
  // Magic items
  var ml=document.getElementById('magicList');
  if(ml){d.magic=[];ml.querySelectorAll('.sec-i').forEach(function(el){
    d.magic.push({n:(el.querySelector('.f-mn')||{}).value||'',d:(el.querySelector('.f-md')||{}).value||''});
  });}
  // Party
  var pl=document.getElementById('partyList');
  if(pl){d.party=[];pl.querySelectorAll('.sec-i').forEach(function(el){
    d.party.push({n:(el.querySelector('.f-pn')||{}).value||'',c:(el.querySelector('.f-pc')||{}).value||''});
  });}
  // People
  var pl2=document.getElementById('peopleList');
  if(pl2){d.people=[];pl2.querySelectorAll('.sec-i').forEach(function(el){
    d.people.push((el.querySelector('.f-ppl')||{}).value||'');
  });}
  // Chronicle
  var cl=document.getElementById('crList');
  if(cl){d.chronicle=[];cl.querySelectorAll('.cr-i').forEach(function(el){
    d.chronicle.push({tag:(el.querySelector('.f-ct')||{}).value||'',title:(el.querySelector('.f-ch')||{}).value||'',body:(el.querySelector('.f-cb')||{}).value||''});
  });}
  return d;
}
