<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>星期日 · 歌织者·梦之铎音 — D&D 5R 人物卡</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0b18;--card:#151220;--card2:#1a1730;--fg:#e0d8cc;--muted:#7a6a9a;--a:#2d1b69;--b:#4a2a8a;--accent:#7c5cfc;--gold:#d4a057;--soft:#c4a4ff;--red:#ff5e6b;--green:#6bcb8a;--blue:#5b9aff}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans SC","PingFang SC","Segoe UI",system-ui,sans-serif;padding:0;line-height:1.6;overflow-x:hidden}
.pg{max-width:800px;margin:0 auto;padding:0 14px 60px;position:relative;z-index:2}
#feather-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
.feather{position:absolute;top:-60px;width:18px;height:8px;background:radial-gradient(ellipse at 30% 50%,rgba(255,248,220,.85),rgba(212,160,87,.2) 60%,transparent 80%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:0;box-shadow:0 0 8px 3px rgba(212,160,87,.08),0 0 2px 1px rgba(255,248,220,.04);will-change:transform,opacity}
.feather::after{content:'';position:absolute;top:2px;left:50%;width:1px;height:6px;background:linear-gradient(to bottom,rgba(255,248,200,.4),transparent);transform:translateX(-50%)}
.music-bar{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;align-items:center;gap:10px;background:rgba(21,18,32,.88);border:1px solid rgba(124,92,252,.15);border-radius:50px;padding:8px 16px 8px 12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.4);transition:all .3s}
.music-btn{width:32px;height:32px;border-radius:50%;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.2);color:var(--soft);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.music-btn:hover{background:rgba(124,92,252,.3);border-color:var(--accent);transform:scale(1.08)}
.music-btn.playing{background:rgba(124,92,252,.25);border-color:var(--accent)}
.progress-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.progress-bar{flex:1;height:4px;border-radius:2px;background:rgba(124,92,252,.12);cursor:pointer;position:relative;min-width:40px;transition:height .15s}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));width:0%;position:relative}
.progress-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .15s}
.progress-bar:hover .progress-fill::after{opacity:1}
.time-display{font-size:.6rem;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:55px;text-align:center}
.music-bar .vol-slider{width:0;overflow:hidden;transition:width .3s;display:flex;align-items:center}
.music-bar:hover .vol-slider,.vol-slider.open{width:80px}
.vol-slider input[type=range]{width:72px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(124,92,252,.2);border-radius:2px;outline:none;margin-left:6px}
.vol-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.vol-slider input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.edit-btn{position:fixed;bottom:76px;right:24px;z-index:100;background:rgba(21,18,32,.88);border:1px solid rgba(124,92,252,.2);color:var(--soft);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.3);transition:all .25s}
.edit-btn:hover{background:rgba(124,92,252,.25);border-color:var(--accent);transform:scale(1.08)}
.edit-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.edit-panel{position:fixed;top:0;right:-440px;width:420px;height:100vh;z-index:99;background:rgba(13,11,24,.98);border-left:1px solid rgba(124,92,252,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:right .35s cubic-bezier(0.22,1,0.36,1);padding:60px 18px 100px;overflow-y:auto;font-size:.82rem;box-shadow:-4px 0 30px rgba(0,0,0,.3)}
.edit-panel.open{right:0}
.edit-panel h3{color:var(--gold);font-size:.9rem;margin:18px 0 8px;border-bottom:1px solid rgba(212,160,87,.1);padding-bottom:4px}
.edit-panel h4{color:var(--soft);font-size:.8rem;margin:12px 0 4px}
.edit-group{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:8px}
.edit-field{display:flex;flex-direction:column;gap:2px}
.edit-field label{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.edit-field input,.edit-field textarea,.edit-field select{background:rgba(124,92,252,.06);border:1px solid rgba(124,92,252,.1);border-radius:4px;padding:4px 7px;color:var(--fg);font-size:.78rem;font-family:inherit;outline:none;transition:border .2s}
.edit-field input:focus,.edit-field textarea:focus{border-color:var(--accent)}
.edit-field.half{grid-column:span 1}
.edit-field.full{grid-column:span 2}
.edit-field textarea{min-height:50px;resize:vertical}
.edit-actions{position:sticky;bottom:0;display:flex;gap:8px;margin-top:16px;padding:12px 0;border-top:1px solid rgba(124,92,252,.1);background:rgba(13,11,24,.98)}
.edit-actions button{flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s}
.btn-save{background:var(--accent);color:#fff}
.btn-save:hover{background:#8a6cff}
.btn-reset{background:rgba(124,92,252,.1);color:var(--muted)}
.btn-reset:hover{background:rgba(124,92,252,.2);color:var(--soft)}
.btn-export{background:rgba(91,154,255,.15);color:var(--blue)}
.btn-export:hover{background:rgba(91,154,255,.25)}
.edit-success{color:var(--green);font-size:.7rem;text-align:center;padding:4px;opacity:0;transition:opacity .3s}
.edit-success.show{opacity:1}
.cr-add{background:rgba(124,92,252,.08);border:1px dashed rgba(124,92,252,.15);border-radius:6px;padding:8px;margin:6px 0;cursor:pointer;text-align:center;color:var(--muted);font-size:.72rem;transition:all .2s}
.cr-add:hover{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--soft)}
.cr-item{border:1px solid rgba(124,92,252,.06);border-radius:5px;padding:6px 8px;margin:4px 0;position:relative}
.cr-item .cr-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(255,94,107,.1);border:1px solid rgba(255,94,107,.15);color:var(--red);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.cr-item:hover .cr-del{opacity:1}
.cr-item .cr-del:hover{background:rgba(255,94,107,.2)}
.spell-item{background:rgba(124,92,252,.03);border:1px solid rgba(124,92,252,.05);border-radius:4px;padding:4px 6px;margin:2px 0;font-size:.7rem;color:#b0a0c8;display:flex;align-items:center;gap:4px}
.spell-item .sp-del{width:16px;height:16px;border-radius:50%;background:rgba(255,94,107,.1);border:none;color:var(--red);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@media(max-width:560px){.edit-panel{width:100vw;right:-100vw}}
h1{font-size:1.8rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#f0e6ff,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:1.15rem;font-weight:700;color:var(--soft);margin:28px 0 10px;padding-bottom:5px;border-bottom:1.5px solid rgba(124,92,252,.2);display:flex;align-items:center;gap:8px}
h2::before{content:"◇";font-size:.7rem;color:var(--accent)}
h3{font-size:.95rem;color:#d0bcf0;margin:14px 0 6px}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:400;margin:1px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.15);color:#b0a0d0}
.tag-r{background:rgba(255,94,107,.08);border-color:rgba(255,94,107,.15);color:#ff8a94}
.tag-g{background:rgba(107,203,138,.08);border-color:rgba(107,203,138,.15);color:#8bdaa4}
.tag-b{background:rgba(91,154,255,.08);border-color:rgba(91,154,255,.15);color:#8bb8ff}
.tag-y{background:rgba(212,160,87,.08);border-color:rgba(212,160,87,.15);color:#e0c080}
.hero{text-align:center;padding:32px 0 16px}
.hero::after{content:'';display:block;width:60px;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:12px auto 0}
.hero .cn{font-size:.8rem;color:var(--muted);letter-spacing:4px}
.hero .info{font-size:.82rem;color:#b0a0c8;margin-top:5px}
.portrait-wrap{width:100%;max-width:320px;margin:16px auto;border-radius:10px;overflow:hidden;border:1px solid rgba(124,92,252,.12)}
.portrait-wrap img{width:100%;display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.info-grid .ig{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:7px;padding:8px 12px}
.info-grid .ig .lb{font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.info-grid .ig .vl{font-size:1rem;font-weight:600;color:#d8ccee}
.abilities{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.ab{text-align:center;background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:8px;padding:10px 4px}
.ab .n{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
.ab .v{font-size:1.2rem;font-weight:700;color:#e8ddf8}
.ab .m{font-size:.78rem;color:var(--muted)}
.card{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:8px;padding:12px 14px;margin:6px 0}
.card .hd{font-weight:600;color:#d0bcf0;margin-bottom:3px;font-size:.88rem}
.card .hd .rn{font-weight:400;font-size:.68rem;color:var(--muted)}
.card p{font-size:.82rem;color:#b0a0c8;line-height:1.65}
.card .meta{font-size:.68rem;color:var(--muted);margin-top:3px}
.g2,.g3{display:grid;gap:6px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px}
.g-auto-s{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px}
.spell-block{margin:14px 0}
.sb-hd{font-size:.8rem;font-weight:600;color:var(--soft);padding:4px 0 2px;margin-bottom:2px;border-left:3px solid var(--accent);padding-left:8px}
.spell-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spell-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:6px 9px;background:rgba(255,255,255,.012)}
.sc-hd{font-size:.76rem;color:#c8b8e0;font-weight:500}
.sc-school{font-size:.62rem;color:#6a5a8a;font-weight:400}
.sc-desc{font-size:.7rem;color:#b0a0c8;line-height:1.55;margin-top:3px}
.sc-meta{font-size:.62rem;color:#5a4a7a;margin-top:3px;font-family:monospace}
.inst-card{border:1px solid rgba(124,92,252,.05);border-radius:5px;padding:5px 8px;background:rgba(255,255,255,.012)}
@media(max-width:560px){.spell-row{grid-template-columns:1fr}}
.chronicle{position:relative;padding-left:24px;margin:6px 0}
.chronicle::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:1.5px;background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.05))}
.chronicle-item{position:relative;padding:6px 0 6px 16px}
.chronicle-item::before{content:'';position:absolute;left:-18px;top:11px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:rgba(124,92,252,.15)}
.chronicle-item .ch-tag{display:inline-block;font-size:.58rem;padding:0 5px;border-radius:3px;margin-right:3px;font-weight:500;background:rgba(124,92,252,.15);color:var(--soft)}
.chronicle-item .ch-title{font-weight:600;color:#d0bcf0;font-size:.85rem}
.chronicle-item .ch-body{font-size:.8rem;color:#b0a0c8;line-height:1.65;margin-top:2px}
.party{display:flex;flex-wrap:wrap;gap:5px}
.party .pc{background:var(--card);border:1px solid rgba(124,92,252,.06);border-radius:7px;padding:6px 12px;font-size:.78rem}
.party .pc .nm{color:#d0bcf0;font-weight:600}
.party .pc .cl{color:var(--muted);font-size:.7rem}
.eq{display:inline-block;background:rgba(124,92,252,.03);border:1px solid rgba(124,92,252,.06);border-radius:4px;padding:2px 7px;margin:1px;font-size:.74rem;color:#b0a0c8}
.eq-gold{background:rgba(212,160,87,.05);border-color:rgba(212,160,87,.08);color:#e0c080}
.note-box{background:rgba(124,92,252,.04);border-left:3px solid var(--gold);border-radius:0 7px 7px 0;padding:8px 12px;margin:8px 0;font-size:.78rem;color:#c0b0d0}
.char-note{background:rgba(124,92,252,.03);border-radius:7px;padding:10px 14px;margin:6px 0;font-size:.8rem;color:#b0a0c8;line-height:1.65}
.char-note .cn-hd{color:#d0bcf0;font-weight:600;font-size:.82rem}
.char-note .cn-tag{font-size:.6rem;color:var(--muted)}
</style>
</head>
<body>
<div id="feather-container"></div>

<!-- EDIT BUTTON -->
<div class="edit-btn" id="editBtn" title="编辑人物卡">✏️</div>

<!-- EDIT PANEL -->
<div class="edit-panel" id="editPanel">
  <h3>📋 基本信息</h3>
  <div class="edit-group">
    <div class="edit-field half"><label>等级</label><input id="e-lvl" /></div>
    <div class="edit-field half"><label>熟练加值</label><input id="e-prof" /></div>
    <div class="edit-field half"><label>生命值</label><input id="e-hp" placeholder="如 45（20+5d8）" /></div>
    <div class="edit-field half"><label>AC</label><input id="e-ac" /></div>
    <div class="edit-field half"><label>先攻</label><input id="e-init" /></div>
    <div class="edit-field half"><label>速度</label><input id="e-speed" /></div>
    <div class="edit-field half"><label>被动察觉</label><input id="e-pp" /></div>
    <div class="edit-field half"><label>诗人激励</label><input id="e-bi" /></div>
  </div>

  <h3>⚔️ 属性</h3>
  <div class="edit-group">
    <div class="edit-field half"><label>力量</label><input id="e-str" type="number" /></div>
    <div class="edit-field half"><label>敏捷</label><input id="e-dex" type="number" /></div>
    <div class="edit-field half"><label>体质</label><input id="e-con" type="number" /></div>
    <div class="edit-field half"><label>智力</label><input id="e-int" type="number" /></div>
    <div class="edit-field half"><label>感知</label><input id="e-wis" type="number" /></div>
    <div class="edit-field half"><label>魅力</label><input id="e-cha" type="number" /></div>
  </div>

  <h3>✨ 法术</h3>
  <div class="edit-group">
    <div class="edit-field half"><label>法术DC</label><input id="e-dc" /></div>
    <div class="edit-field half"><label>法术攻击</label><input id="e-atk" /></div>
    <div class="edit-field full"><label>法术位（逗号分隔）</label><input id="e-slots" placeholder="如 4,3,3" /></div>
  </div>
  <div id="spellEditor"></div>

  <h3>📜 冒险纪事</h3>
  <div id="chronicleEditor"></div>
  <div class="cr-add" id="addChronicleBtn">+ 新增纪事条目</div>

  <div class="edit-actions">
    <button class="btn-save" id="saveBtn">💾 保存并应用</button>
    <button class="btn-export" id="exportBtn">📤 导出数据</button>
    <button class="btn-reset" id="resetBtn">↺ 重置</button>
  </div>
  <div class="edit-success" id="editSuccess">✅ 已保存</div>
</div>

<!-- AUDIO -->
<audio id="bgAudio" preload="auto" style="display:none"></audio>
<div class="music-bar" id="musicBar">
  <button class="music-btn" id="musicToggle" title="播放/暂停">▶</button>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="time-display" id="timeDisplay">0:00 / 4:57</span>
  </div>
  <div class="vol-slider" id="volSlider">
    <input type="range" id="volControl" min="0" max="1" step="0.05" value="0.3" />
  </div>
</div>

<div class="pg" id="pageContent"></div>

<script>
(function(){
const DEFAULTS = {
  lvl:'6', prof:'+3', hp:'45（20+5d8）', ac:'15', init:'+4',
  speed:'30尺（变身可飞行30尺）', pp:'16',
  bi:'八面骰 · 每天5次（短休恢复）',
  str:12, dex:18, con:15, int:14, wis:16, cha:20,
  dc:'16', atk:'+8', slots:'4,3,3',
  spells: {
    cantrips:[
      {n:'光亮术',s:'塑能',d:'触碰一个物件，发出半径20尺光照+20尺微光。',m:'动作·触碰·V、S·1小时'},
      {n:'修复术',s:'变化',d:'修复一个破损物件的单处断裂或裂缝。',m:'1分钟·触碰·V、S、M·立即'},
      {n:'恶言相加',s:'惑控',d:'对一个生物说出魔法侮辱，造成1d4心灵伤害。',m:'附赠·60尺·V·立即'},
      {n:'流光闪灵',s:'塑能·歌织者',d:'远程法术攻击，命中1d8光耀伤害。',m:'动作·120尺·V、S·立即'},
      {n:'魔法伎俩',s:'变化',d:'改变颜色/温度、清洁/弄脏等基础把戏。',m:'动作·30尺·V、S·至多1小时'}
    ],
    level1:[
      {n:'命令术',s:'惑控',d:'命令一个生物服从单字指令。',m:'动作·60尺·V·1轮'},
      {n:'治愈真言',s:'防护',d:'一个可见生物恢复1d4+魅力调整值。',m:'附赠·60尺·V·立即'},
      {n:'羽落术',s:'变化',d:'最多5个生物不受坠落伤害。',m:'反应·60尺·V、M·1分钟'},
      {n:'妖火',s:'塑能',d:'20尺立方内生物被描出轮廓，攻击者优势。',m:'动作·60尺·V·专注·至多1分钟'}
    ],
    level2:[
      {n:'沉默术',s:'幻术',d:'40尺半径球状区域绝对寂静，无法施法。',m:'动作·120尺·V、S·专注·至多10分钟'},
      {n:'人类定身术',s:'惑控',d:'一个人形生物被麻痹。',m:'动作·60尺·V、S、M·专注·至多1分钟'},
      {n:'暗示术',s:'惑控',d:'用一句话暗示生物执行合理指令。',m:'动作·30尺·V、M·专注·至多8小时'},
      {n:'识破隐形',s:'预言',d:'看透隐形、灵体及隐藏魔法陷阱。',m:'动作·自身·V、S、M·专注·至多1小时'}
    ],
    level3:[
      {n:'解除魔法',s:'防护',d:'终止生物/物件/魔法效应上的法术。',m:'动作·120尺·V、S·立即'},
      {n:'死者交谈',s:'死灵',d:'触碰一具尸体问5个问题。',m:'动作·触碰·V、S、M·10分钟'},
      {n:'举目皆敌',s:'惑控',d:'扭曲一个生物的感知，视周围所有生物为敌。',m:'动作·120尺·V、S·专注·至多1分钟'}
    ],
    instrument:[
      {n:'飞行术',s:'变化·60尺飞行',m:'动作·触碰·专注至多10分钟'},
      {n:'隐形术',s:'幻术·触碰隐形',m:'动作·触碰·专注至多1小时'},
      {n:'浮空术',s:'变化·垂直升降',m:'动作·60尺·专注至多10分钟'},

function renderSpells(sp){
  if(!sp)return'';
  var levels={cantrips:'戏法（0环）',level1:'1环法术（'+(slotsParse()[0]||4)+'个法术位）',level2:'2环法术（'+(slotsParse()[1]||3)+'个法术位）',level3:'3环法术（'+(slotsParse()[2]||3)+'个法术位）',instrument:'🎵 克里里拉琴 · 乐器法术（每日各一次）'};
  var colors={cantrips:'var(--accent)',level1:'var(--blue)',level2:'var(--green)',level3:'var(--red)',instrument:'var(--gold)'};
  var r='';
  Object.keys(levels).forEach(function(k){
    if(!sp[k]||!sp[k].length)return;
    r+='<div class="spell-block"><div class="sb-hd" style="border-left-color:'+colors[k]+';'+(k==='instrument'?'color:var(--gold)':'')+'">'+levels[k]+'</div><div class="spell-row">';
    sp[k].forEach(function(s){
      r+='<div class="'+(k==='instrument'?'inst-card':'spell-card')+'"><div class="sc-hd">'+s.n+' <span class="sc-school">· '+s.s+'</span></div>'+
        (s.d?'<div class="sc-desc">'+s.d+'</div>':'')+
        '<div class="sc-meta">'+s.m+'</div></div>';
    });
    r+='</div></div>';
  });
  return r;
}

function slotsParse(){try{var d=load();return d.slots?d.slots.split(',').map(function(x){return x.trim()}):['4','3','3']}catch(e){return['4','3','3']}}

// ═══ Populate form ═══
function populateForm(d){
  ['lvl','prof','hp','ac','init','speed','pp','bi','dc','atk','slots'].forEach(function(k){var el=document.getElementById('e-'+k);if(el)el.value=d[k]||''});
  ['str','dex','con','int','wis','cha'].forEach(function(k){var el=document.getElementById('e-'+k);if(el)el.value=d[k]||''});
  renderChronicleEditor(d.chronicle||[]);
  renderSpellEditor(d.spells);
}

function collectForm(){
  var d={};
  ['lvl','prof','hp','ac','init','speed','pp','bi','dc','atk','slots'].forEach(function(k){var el=document.getElementById('e-'+k);d[k]=el?el.value:''});
  ['str','dex','con','int','wis','cha'].forEach(function(k){var el=document.getElementById('e-'+k);d[k]=parseInt(el?el.value:10)||10});
  d.chronicle=collectChronicle();
  d.spells=collectSpells();
  return d;
}

// ═══ Chronicle editor ═══
function renderChronicleEditor(arr){
  var el=document.getElementById('chronicleEditor');
  if(!el)return;
  el.innerHTML=arr.map(function(c,i){
    return '<div class="cr-item">'+
      '<div class="cr-del" data-idx="'+i+'">✕</div>'+
      '<div class="edit-field" style="margin-bottom:3px"><label>标签</label><input class="cr-tag" value="'+c.tag+'" /></div>'+
      '<div class="edit-field" style="margin-bottom:3px"><label>标题</label><input class="cr-title" value="'+c.title.replace(/"/g,'&quot;')+'" /></div>'+
      '<div class="edit-field"><label>内容</label><textarea class="cr-body" rows="2">'+c.body+'</textarea></div>'+
      '</div>';
  }).join('');
  el.querySelectorAll('.cr-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      var d=collectForm();
      d.chronicle.splice(idx,1);
      save(d);render(d);populateForm(d);
    });
  });
}

function collectChronicle(){
  var arr=[];
  var items=document.querySelectorAll('#chronicleEditor .cr-item');
  items.forEach(function(item){
    arr.push({
      tag:(item.querySelector('.cr-tag')||{}).value||'',
      title:(item.querySelector('.cr-title')||{}).value||'',
      body:(item.querySelector('.cr-body')||{}).value||''
    });
  });
  return arr;
}

// ═══ Spell editor ═══
function renderSpellEditor(sp){
  var el=document.getElementById('spellEditor');
  if(!el||!sp)return;
  var levels=['cantrips','level1','level2','level3','instrument'];
  var names={cantrips:'戏法',level1:'1环',level2:'2环',level3:'3环',instrument:'乐器'};
  el.innerHTML='<h4>法术管理</h4>'+levels.map(function(k,i){
    return '<div style="margin-bottom:6px"><div style="font-size:.7rem;color:var(--muted);margin-bottom:2px">'+names[k]+' <span style="color:var(--soft);cursor:pointer" class="sp-add" data-level="'+k+'">+</span></div>'+
      (sp[k]||[]).map(function(s,j){
        return '<div class="spell-item"><span class="sp-del" data-level="'+k+'" data-idx="'+j+'">✕</span> '+s.n+' <span style="color:var(--muted)">· '+s.s+'</span></div>';
      }).join('')+'</div>';
  }).join('');
  el.querySelectorAll('.sp-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      var level=this.getAttribute('data-level'),idx=parseInt(this.getAttribute('data-idx'));
      var d=collectForm();
      if(d.spells[level])d.spells[level].splice(idx,1);
      save(d);render(d);populateForm(d);
    });
  });
  el.querySelectorAll('.sp-add').forEach(function(btn){
    btn.addEventListener('click',function(){
      var level=this.getAttribute('data-level');
      var name=prompt('输入法术名称：');
      if(!name)return;
      var school=prompt('学派（如 塑能、惑控）：')||'';
      var desc=prompt('简述：')||'';
      var meta=prompt('施法信息：')||'';
      var d=collectForm();
      if(!d.spells[level])d.spells[level]=[];
      d.spells[level].push({n:name,s:school,d:desc,m:meta});
      save(d);render(d);populateForm(d);
    });
  });
}

function collectSpells(){
  var sp={cantrips:[],level1:[],level2:[],level3:[],instrument:[]};
  try{
    var d=load();
    if(d.spells){
      Object.keys(d.spells).forEach(function(k){sp[k]=d.spells[k]});
    }
  }catch(e){}
  return sp;
}

pb.addEventListener('mousedown',function(e){is=1;sk(e)});
document.addEventListener('mousemove',function(e){if(is)sk(e)});
document.addEventListener('mouseup',function(){is=0});
pb.addEventListener('touchstart',function(e){is=1;skt(e)},{passive:1});
document.addEventListener('touchmove',function(e){if(is)skt(e)},{passive:1});
document.addEventListener('touchend',function(){is=0});
function sk(e){if(!audio.duration)return;var r=pb.getBoundingClientRect(),x=Math.max(0,Math.min(e.clientX-r.left,r.width)),p=x/r.width;audio.currentTime=p*audio.duration;pf.style.width=(p*100)+'%';td.textContent=ft(audio.currentTime)+' / '+ft(audio.duration)}
function skt(e){if(!audio.duration||!e.touches[0])return;var r=pb.getBoundingClientRect(),x=Math.max(0,Math.min(e.touches[0].clientX-r.left,r.width)),p=x/r.width;audio.currentTime=p*audio.duration;pf.style.width=(p*100)+'%';td.textContent=ft(audio.currentTime)+' / '+ft(audio.duration)}
vs.addEventListener('input',function(){audio.volume=parseFloat(vs.value)});
document.addEventListener('keydown',function(e){if((e.key==='m'||e.key==='M')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){e.preventDefault();tb.click();tb.style.transform='scale(1.2)';setTimeout(function(){tb.style.transform=''},150)}});

// ═══ Feathers ═══
(function(){var c=document.getElementById('feather-container');if(!c)return;
function f(){var e=document.createElement('div');e.className='feather';var sz=12+Math.random()*16,sx=Math.random()*100,du=6+Math.random()*8,de=Math.random()*2,dr=-30+Math.random()*60,ro=Math.random()*360,sp=-120+Math.random()*240,op=.3+Math.random()*.5,bl=Math.random()*1.5;
e.style.cssText='left:'+sx+'%;width:'+sz+'px;height:'+sz*.45+'px;opacity:0;filter:blur('+bl+'px)';
var kf=[{opacity:0,transform:'translateY(0) translateX(0) rotate('+ro+'deg)',offset:0},{opacity:op,transform:'translateY(10vh) translateX('+dr*.2+'px) rotate('+(ro+sp*.15)+'deg)',offset:.08},{opacity:op,transform:'translateY(40vh) translateX('+dr*.5+'px) rotate('+(ro+sp*.4)+'deg)',offset:.35},{opacity:op*.8,transform:'translateY(70vh) translateX('+dr*.8+'px) rotate('+(ro+sp*.7)+'deg)',offset:.65},{opacity:0,transform:'translateY(105vh) translateX('+dr+'px) rotate('+(ro+sp)+'deg)',offset:1}];
var ti={duration:du*1000,delay:de*1000,easing:'cubic-bezier(0.25,0.46,0.45,0.94)',fill:'forwards'};c.appendChild(e);var an=e.animate(kf,ti);an.onfinish=function(){e.remove()}}
for(var i=0;i<12;i++)setTimeout(f,i*400);var st=setInterval(f,1800);document.addEventListener('visibilitychange',function(){if(document.hidden)clearInterval(st);else st=setInterval(f,1800)})})();

})();
</script>
</body>
